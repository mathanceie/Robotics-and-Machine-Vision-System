<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robotics Course</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: white;
    }
    header {
      display: flex;
      justify-content: space-between;
      padding: 20px 40px;
      background: #0f1a2f;
    }
    nav a {
      margin: 0 15px;
      color: white;
      text-decoration: none;
      font-weight: bold;
    }
    .hero {
      text-align: center;
      padding: 50px 20px;
    }
    .modules {
      padding: 40px;
    }
    .module-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }
    .card {
      background: #111c33;
      padding: 20px;
      border-radius: 10px;
    }
    .card button {
      margin-top: 10px;
      padding: 10px;
      background: #1e90ff;
      border: none;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    .section {
      padding: 40px;
    }
  </style>
</head>
<body>

<header>
  <h2>Robotics Course</h2>
  <nav>
    <a href="#">Home</a>
    <a href="#modules">Modules</a>
    <a href="#materials">Materials</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<div class="hero">
  <h1>ROBOTICS AND MACHINE VISION</h1>
  <h3>20EI254 | Your Name</h3>
  <p>Interactive Digital Learning Platform</p>
</div>

<div class="modules" id="modules">
  <h2>Course Modules</h2>
  <div class="module-grid">
    <div class="card">
      <h3>Module I</h3>
      <p>Fundamentals of Robotics</p>
      <button>View Slides</button>
    </div>
    <div class="card">
      <h3>Module II</h3>
      <p>Kinematics</p>
      <button>View Slides</button>
    </div>
    <div class="card">
      <h3>Module III</h3>
      <p>Trajectory Control</p>
      <button>View Slides</button>
    </div>
    <div class="card">
      <h3>Module IV</h3>
      <p>Machine Vision</p>
      <button>View Slides</button>
    </div>
    <div class="card">
      <h3>Module V</h3>
      <p>Applications</p>
      <button>View Slides</button>
    </div>
  </div>
